<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
	table {
		border: "1";
		width: "500";
		background-color: "orange";
	}
</style>
</head>
<body>
	<h1>표의 구조를 지정 : thead, tbody, tfooter</h1>
	<h2>상품데이터</h2>
	<p>th는 자동으로 중앙정렬</p>
	<!-- <table border="1" width="500" style="background-color: orange;"> -->
	<table>
		<caption>성물용과 가정용 상품 구성</caption>
		<thead>
			<tr>
				<th>용도</th>
				<th>중량</th>
				<th>갯수</th>
				<th>가격</th>
			</tr>
		</thead>
		<tbody>
			<tr>
				<th rowspan="2">선물용</th>
				<th>중량 3kg</th>
				<th>13~16과</th>
				<th>35000</th>
			</tr>
			<tr>
<!-- 			<th>선물용</th> -->
				<th>중량 5kg</th>
				<th>13~16과</th>
				<th>33000</th>
			</tr>
			<tr>
				<th rowspan="2">가정용</th>
				<th>중량 3kg</th>
				<th>13~16과</th>
				<th>35000</th>
			</tr>
			<tr>
<!-- 			<th>가정용</th> -->
				<th>중량 3kg</th>
				<th>13~16과</th>
				<th>35000</th>
			</tr>
		</tbody>
		<tfoot>
			<tr>
				<th colspan="4">전체상품구성</th>
			</tr>
		</tfoot>
	</table>
</body>
</html>
