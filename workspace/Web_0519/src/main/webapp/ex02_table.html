<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ex2_table</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
	<h1>table : 행row / 열 column / 셀 cell</h1>
	
	<div id="s1">  <!--속성) di:식별자(프라이머리키) 특정개체를 식별하기위해 주는 고유값-->
		<h2>표를 만드는 table, caption 태그</h2>
		<table>
			<caption>표 제목</caption>
		</table>
		<hr>
		<table border="1">
			<tr>
				<td>1행 1열</td>
				<td>1행 2열</td>
				<td>1행 3열</td>
			</tr>
			<tr>
				<td>2행 1열</td>
				<td>2행 2열</td>	
				<td>2행 3열</td>		
			</tr>
			<tr>
				<td>3행 1열</td>
				<td>3행 2열</td>		
				<td>3행 3열</td>	
			</tr>
		</table>
	</div>
	<div id="s2">
		<p>상품데이터</p>
		<table>
			<caption>caption ::: 선물용과 가정용 상품 구성</caption>
			<tr>
				<th>용도</th>
				<th>중량</th>
				<th>갯수</th>
				<th>가격</th>
			</tr>
			<tr>
				<th>선물용</th>
				<th>중량 3kg</th>
				<th>13~16과</th>
				<th>35000</th>
			</tr>
			<tr>
				<th>선물용</th>
				<th>중량 5kg</th>
				<th>13~16과</th>
				<th>33000</th>
			</tr>
			<tr>
				<th>선물용</th>
				<th>중량 3kg</th>
				<th>13~16과</th>
				<th>35000</th>
			</tr>
		</table>
	</div>

</body>
</html>
