<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ex14_boxsizing</title>
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<style>
div{
	margin-bottom: 20px;
}
.box1{
	width: 200px; height: 100px; padding: 20px; border: 10px solid #ccc;
}
.box2{
    box-sizing: border-box;
    width: 200px;
	height: 100px;
	padding: 20px;
	border: 10px solid #00f;
}
/*
박스 는 테두리 까지 포함해서 200px 이므로 좌우 패딩 값 40px , 
좌우 테 두릿 값 20px 을 뺀 나머지 140px 이 실제 콘텐츠 영역 의 너비 이다.
CSS 에서 박스 모델 을 사용 하면서 요소 의 크기 를 쉽게 계산 하려면 box - sizing 속성 을 
border-box 로 지정해 놓는 것이 좋다.
border-box : 패딩과 테두리를 포함해서 너비값을 지정함. 
content-box : 콘텐츠 영역만 너비값을 지정함. 기본값 - 
*/
</style>
</head>
<body>
	<div class="box1"></div>
	<div class="box2"></div>
</body>
</html>
