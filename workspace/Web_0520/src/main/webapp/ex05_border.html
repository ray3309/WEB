<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ex05_border</title>
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<style>
/* 테두리 스타일 지정하기 */
div{
	width: 200px; height: 100px;
	margin: 15px;
	display:inline-block;
	/*
		display:inline =>inline요소 처럼 만들때 사용 
		inline-block => 한줄처럼 배치가 되지만 블록요소 처럼 너비,높이,패딩, 마진 먹힌다.
	*/
	text-align: center;
	font-size: 20px;
	line-height: 100px;
	border-width: 5px; /* 테두리 굵기 */
}
.box1 { border-style:solid; }  /* 실선 */
.box2 { border-style:dotted; }  /* 점선 */
.box3 { border-style:dashed; }  /* 짧은 점선 */
</style>
</head>
<body>
	<div class="box1">실선 테두리 </div>
	<div class="box2">점선 테두리 </div>
	<div class="box3">짧은 점선</div>
</body>
</html>
