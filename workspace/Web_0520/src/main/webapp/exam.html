<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>exam</title>
<style>
nav ul {
	/* 불릿이나 숫자 번호 없앰 */
	list-style: none;
}

nav ul li {
	float: left; /* float */
	width: 100px; /* 너비 - 100px */
	height: 40px; /* 높이 - 40px */
	line-height: 40px; /* 세로로 중앙 배치 40px */
	text-align: center; /* 가로로 중앙 배치 */
	margin: 10px; /*  마진 - 10px */
	border: 1px solid black; /*테두리 - 1px 검은 실선 */
}

nav ul li:hover {
	background-color: orange;
}

a {
	text-decoration: none; /* 텍스트 링크 밑줄 없애기 */
}

a:hover {
	cursor: crosshair; /* 마우스 롤오버시 커서를 + 표시로 변경 */
}

.cls {
	clear: both;
	padding-top: 20px;
	background-color: orange;
	font-weight: bold;
	font-size: x-large;
}
</style>
</head>
<body>
	<nav>
		<ul>
			<li><a href="#">메뉴 1</a></li>
			<li><a href="#">메뉴 2</a></li>
			<li><a href="#">메뉴 3</a></li>
			<li><a href="#">메뉴 4</a></li>
		</ul>
	</nav>
	<div class="cls">* 일본에서 쌀값이 급등하고 있는</div>
</body>
</html>
