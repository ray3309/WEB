<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ex11_float</title>
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<style>
	#wrap {
		width: 800px; margin: 10px auto;
		padding: 20px;
		border:  1px solid #000;
	}
	.box{
		padding: 20px;
		margin: 10px;
	}
	/*float 속성을 사용해 배치하기 */
	#box1{ background: pink; float: left;}
	#box2{ background: skyblue; float: right;}
</style>
</head>
<body>
	<div id="wrap">
		 <div class="box" id="box1">박스1</div>
         <div class="box" id="box2">박스2</div>
         <p>일본에서 쌀값이 급등하고 있는 가운데 한국을 방문해 쌀을 구매해 간 일본인 관광객의 후기가 화제가 되고 있다.</p>
	</div>
</body>
</html>
