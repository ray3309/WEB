<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ex07_border</title>
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<style>
div {
	width: 200px;
	height: 100px;
	display: inline-block;
	margin: 15px;
	border-style: dashed; /* 테두리 스타일 - 선으로 된 점선 */
	border-width: 2px; /* 테두리 굵기 - 2px */
}
/*테두리 스타일 묶어서 지정하기 */
h1 {
padding-bottom: 5px;
border-bottom: 3px solid rgb(75, 70, 70); /* 아래쪽 테두리만 3px짜리 회색 실선*/
}
p{
padding: 10px;
border: 3px dotted blue; /* 모든 테두리를 3px짜리 파란 점선 */
}
/* box1에는 border-color를 red , box2에는 top-color:blue ,left-color:red */
.box1 {
	border-color: red; /* 전체 테두리 - 빨강 */
}
.box2 {
	border-top-color: blue; /* 위쪽 테두리 - 파랑 */
	border-left-color: red; /* 왼쪽 테두리 - 빨강 */
}
</style>
</head>
<body>
	<h1>박스 모델</h1>
	<p>패딩(padding), 박스의 테두리(border), 마진(margin) 등의 요소로 구성</p>
	<div class="box1"></div>
	<div class="box2"></div>
</body>
</html>
