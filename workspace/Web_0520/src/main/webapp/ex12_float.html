<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ex12_float</title>
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<style>
#wrap {
	width: 800px;
	margin: auto;
	padding: 20px;
	border: 1px solid #ccc;
}

.sidebar {
	width: 150px;
	height: 150px;
}

#left {
	background: orange;
	float: left;
	margin-right: 10px;
}

#right {
	background: olive;
	float: right;
	margin-left: 10px;
}
/*clear 속성을 사용해 플로팅 해제하기 */
.cls {
	clear: both;
	padding-top: 20px;
}
</style>
</head>
<body>
	<div id="wrap">
		<div class="sidebar" id="left">사이드바1</div>
		<div class="sidebar" id="right">사이드바2</div>
		<p>일본에서 쌀값이 급등하고 있는 가운데 한국을 방문해 쌀을 구매해 간 일본인 관광객의 후기가 화제가 되고 있다.</p>
		<p class="cls">* 일본에서 쌀값이 급등하고 있는 가운데 한국을 방문해 쌀을 구매해 간 일본인 관광객의
			후기가 화제가 되고 있다.</p>
	</div>
</body>
</html>
