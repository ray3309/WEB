<style>
	ul { list-style: none; display: flex;}
	li { border: 1px solid #222; padding: 10px 20px; margin-right: 10px}
	a { text-decoration: none;}
	a:link,a:visited{ /*링크나 visit 하나의 색상으로 초기화 */
		color:#222;
	}
	a:hover {
	 /*a 태그에 마우스를 올렸을 때*/
	 color:orange;
	}
	h1{
		/*rgb() : red,green,blue 0 : 하나도 섞이지 않은 값 , ~ 255 가득 섞였을 때 값*/
	/* 불투명도rgb(0,0,255,) 1:완전 불투명 ,0 투명 0 ~ 1 */
		color: rgb(0,0,255,0.5)
	}
	
</style>
